name: check-updates
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.scrape.outputs.builds }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Scrape UUP-dump + diff against state
        id: scrape
        shell: bash
        run: |
          mkdir -p .state
          python -c "
          from scripts.uupd.scrape import fetch_latest
          from scripts.uupd.diff import load_known, save_known, diff_new
          from scripts.uupd.resolve import resolve
          from scripts.uupd.scrape import Build
          from scripts.build.matrix import expand
          from pathlib import Path
          import json
          scraped = [b.to_dict() for b in fetch_latest()]
          state = Path('.state/known.json')
          new = diff_new(state, scraped)
          save_known(state, scraped)
          new_builds = [Build(**{k: b[k] for k in ('title','arch','uuid','added_at')}) for b in new]
          rows = [r for r in (resolve(b) for b in new_builds) if r]
          matrix = []
          for r in rows:
              for ed in expand(Path('config/editions.yaml'), product=r['name']):
                  matrix.append({**r, **ed})
          print('builds=' + json.dumps(matrix))
          " | tee scrape.out
          BUILDS=$(grep -E '^builds=' scrape.out | sed 's/^builds=//')
          echo "builds=$BUILDS" >> $GITHUB_OUTPUT

  open-pr:
    needs: check
    if: needs.check.outputs.builds != '[]' && needs.check.outputs.builds != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: phantomic12/winforge-private
          token: ${{ secrets.WINFORGE_PRIVATE_TOKEN }}
      - name: Build manifest
        env:
          BUILDS: ${{ needs.check.outputs.builds }}
          GH_TOKEN: ${{ secrets.WINFORGE_PRIVATE_TOKEN }}
        run: |
          mkdir -p manifests
          echo "$BUILDS" | python -m json.tool > manifests/new-builds.json
          git config user.name "winforge-bot"
          git config user.email "winforge-bot@users.noreply.github.com"
          git checkout -b "auto/$(date -u +%Y%m%dT%H%M%S)"
          git add manifests/new-builds.json
          git commit -m "ci: new UUP-dump builds detected"
          git push -u origin "HEAD"
          gh pr create --title "Auto: new UUP-dump builds" --body-file manifests/new-builds.json
