name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy scripts
      - run: pytest -q

  boot-test:
    # Runs the ISO bootability tests with real tools installed.
    # The `test` job above doesn't install xorriso/genisoimage/7z, so
    # every test that builds or verifies a real ISO skips. This job
    # installs the same toolchain the build pipeline uses so the
    # bootability tests actually execute.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Install ISO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso genisoimage p7zip-full isolinux syslinux-common
          ls -la /usr/lib/ISOLINUX/isohdpfx.bin
      - name: Run bootability tests
        run: pytest tests/test_iso_bootability.py tests/test_repack_uefi.py tests/test_verify_iso_bootable.py -v --tb=short
      - name: Run remaining tests (no skips expected)
        run: pytest tests/ -q --tb=short
