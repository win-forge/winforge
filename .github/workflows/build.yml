name: build
on:
  workflow_call:
    inputs:
      # Profile is the canonical input. If set, all other fields are resolved from
      # config/profiles/<profile>.yaml in the CALLER's repo (not winforge).
      profile:
        required: false
        type: string
        default: ""
      # Direct override inputs (for one-off builds that don't warrant a profile)
      product:
        required: false
        type: string
        default: ""
      edition:
        required: false
        type: string
        default: ""
      language:
        required: false
        type: string
        default: ""
      compression:
        required: false
        type: string
        default: ""
      label:
        required: false
        type: string
        default: ""
      uup_uuid:
        required: false
        type: string
        default: ""
      uup_title:
        required: false
        type: string
        default: ""
      autounattend_xml:
        required: false
        type: string
        default: ""
      # Path inside the caller's repo where config lives. Defaults to ./ (root).
      # Useful for monorepos that keep winforge configs in a subdirectory.
      config_root:
        required: false
        type: string
        default: ""
      # Override the winforge version to pull. Default: pinned major.minor.
      # Use a SHA for bleeding-edge, or @main for dev. Production should pin.
      winforge_ref:
        required: false
        type: string
        default: "v1"
    secrets:
      RCLONE_CONF:
        required: true
      ACCOUNTS_YAML:
        required: true
  # Allow direct triggers on the winforge repo itself (legacy / self-build mode).
  # When a user calls `uses: phantomic12/winforge/.github/workflows/build.yml@v1`,
  # only workflow_call fires. These other triggers let winforge build itself
  # without needing a separate config repo.
  repository_dispatch:
    types: [build-request]
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile name from config/profiles/ (winforge self-build only)"
        required: false
        type: string
        default: "win11-prod"

jobs:
  build:
    # Ubuntu: UUP-dump converter uses wimlib, cabextract, chntpw, genisoimage
    # (Linux-only). Windows runner doesn't have these without manual install.
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Resolve the profile (if given) into concrete env vars. Direct inputs
      # override profile values, so a dispatch with `profile: win11-prod, edition:
      # enterprise` works (and overrides only edition).
      PROFILE: ${{ inputs.profile || github.event.client_payload.profile }}
      PRODUCT: ${{ inputs.product || github.event.client_payload.product }}
      EDITION: ${{ inputs.edition || github.event.client_payload.edition }}
      LANGUAGE: ${{ inputs.language || github.event.client_payload.language }}
      COMPRESSION: ${{ inputs.compression || github.event.client_payload.compression }}
      LABEL: ${{ inputs.label || inputs.profile || github.event.client_payload.label }}
      UUP_UUID: ${{ inputs.uup_uuid || github.event.client_payload.uup_uuid }}
      UUP_TITLE: ${{ inputs.uup_title || github.event.client_payload.uup_title }}
      AUTOU_XML: ${{ inputs.autounattend_xml || github.event.client_payload.autounattend_xml || '' }}
      # Where the caller's config lives. Empty string = repo root.
      CONFIG_ROOT: ${{ inputs.config_root }}
      # Winforge ref. v1 = stable major-version tag (recommended).
      WINFORGE_REF: ${{ inputs.winforge_ref }}
    steps:
      # Free disk space BEFORE checkout (this action remounts $GITHUB_WORKSPACE).
      # UUP→WIM conversion can hit 8GB+ intermediate; runner ships 25-29GB free
      # of 84GB total. Concat / and /mnt via LVM to get ~60GB usable.
      - name: Maximize build disk space
        uses: easimon/maximize-build-space@master
        with:
          # Leave room for apt installs (~500MB) + a buffer. Conversion peak
          # is ~8GB WIM + ~5GB UUPs.
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 2048
          # Strip preinstalled runtimes we don't need. None of these are
          # used by wimlib/cabextract/genisoimage.
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          # The build doesn't use Docker (UUP-dump converter is a shell script,
          # not a container). Pulled images on a fresh runner are minimal
          # (~0GB) but explicit-true keeps the action deterministic.
          remove-docker-images: 'true'

      # The action above frees / and /mnt, but the runner's *own* log volume
      # (where _diag/Worker logs are written) is a separate filesystem that
      # can fill up on long-running builds and cause the runner to crash
      # mid-step with ENOSPC. Clear old logs + caches from the runner volume
      # too. Must run AFTER the maximize-build-space step (which may need
      # /mnt for loopback images) but BEFORE the build (which produces logs).
      - name: Clear runner diagnostic logs + cache
        shell: bash
        run: |
          echo "Runner volume before cleanup:"
          df -h /home/runner 2>/dev/null || df -h / || true
          # Truncate _diag logs to 0 bytes (preserves file handles the runner
          # has open, but releases the disk blocks)
          sudo find /home/runner -path '*/_diag/Worker_*.log' -size +10M \
            -exec sudo truncate -s 0 {} \; 2>/dev/null || true
          # Remove old run cache dirs (anything older than the current run id)
          # The runner is _diag/<version>/_diag/Worker_<runid>.log; we keep
          # only the most recent one. Older versions' diag logs are dead weight.
          sudo find /home/runner -path '*/actions-runner/cached/*/_diag/Worker_*.log' \
            -mmin +5 -delete 2>/dev/null || true
          # Optional: remove pre-installed toolchains we don't need (Python
          # is reinstalled by setup-python@v6 below, so this is safe to clear)
          sudo rm -rf /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          echo "Runner volume after cleanup:"
          df -h /home/runner 2>/dev/null || df -h / || true

      # Dual checkout pattern for reusable workflows.
      #
      # When this workflow is invoked via `uses: phantomic12/winforge/...@v1`
      # from a config repo, the runner checks out the CALLER's repo by default.
      # That gives us config/profiles/, autounattend/, etc. — but NOT the
      # winforge scripts.
      #
      # We then checkout winforge into .winforge/ to get scripts/ + pyproject.toml.
      # PYTHONPATH points scripts/ at .winforge/scripts/ and we install with
      # `pip install -e ./.winforge` to get the `scripts.*` imports working.
      #
      # When this workflow runs on the winforge repo itself (self-build via
      # repository_dispatch or workflow_dispatch), the first checkout already
      # has scripts/, so we skip the second checkout.
      - name: Checkout caller (config repo)
        if: github.event_name == 'workflow_call'
        uses: actions/checkout@v6
        with:
          # Pin to the caller's HEAD. workflow_call runs in the caller's
          # context so GITHUB_SHA is the caller's commit, not winforge's.
          ref: ${{ github.sha }}

      - name: Checkout winforge (self-build only)
        if: github.event_name != 'workflow_call'
        uses: actions/checkout@v6
        with:
          # Reuse the working copy — the default checkout already got winforge.
          path: .

      - name: Checkout winforge (caller mode)
        if: github.event_name == 'workflow_call'
        uses: actions/checkout@v6
        with:
          repository: phantomic12/winforge
          ref: ${{ env.WINFORGE_REF }}
          path: .winforge

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        # In workflow_call mode, install from .winforge so scripts.* imports work.
        # In self-build mode, install from . which is winforge itself.
        run: |
          if [ -d .winforge ]; then
            echo "Installing winforge from .winforge/ (caller mode)"
            pip install -e ./.winforge
          else
            echo "Installing winforge from . (self-build mode)"
            pip install -e .
          fi
        # scripts/ is on PYTHONPATH in both modes so the test code can
        # import scripts.profiles.load etc. even before pip install completes.
        env:
          PYTHONPATH: ${{ github.workspace }}/.winforge/scripts:${{ github.workspace }}/scripts

      - name: Resolve profile into build env vars
        if: env.PROFILE != ''
        id: profile
        env:
          # The profile loader looks in $CONFIG_ROOT/config/profiles/ first,
          # then falls back to the winforge repo's config/ (for self-build).
          WINFORGE_CONFIG_ROOT: ${{ env.CONFIG_ROOT }}
        run: |
          # Pick the right config root: caller-supplied, or $GITHUB_WORKSPACE,
          # or .winforge/ (self-build).
          if [ -n "$WINFORGE_CONFIG_ROOT" ]; then
            CFG="$WINFORGE_CONFIG_ROOT"
          elif [ -d ".winforge" ]; then
            CFG=".winforge"
          else
            CFG="."
          fi
          echo "Loading profile from: $CFG/config/profiles/$PROFILE.yaml"
          # Get unquoted KEY=val lines for GITHUB_ENV (env vars don't need quoting)
          # and quoted KEY="val" for shell eval (CLI consumers).
          eval_lines=$(cd "$CFG" && python -m scripts.profiles.load "$PROFILE")
          # Strip the quoting that the script emits for shell eval safety.
          # Lines look like: KEY="value" — we want KEY=value for GITHUB_ENV.
          unquoted_lines=$(echo "$eval_lines" | sed 's/="\([^"]*\)"$/=\1/')
          echo "$unquoted_lines" >> "$GITHUB_ENV"
          echo "Resolved profile $PROFILE:"
          for k in PRODUCT EDITION LANGUAGE COMPRESSION LABEL UUP_UUID UUP_TITLE; do
            echo "  $k=${!k}"
          done

      - name: Install system deps for UUP conversion
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 cabextract wimtools chntpw genisoimage xorriso isolinux uuid-runtime
          # xorriso needs isohdpfx.bin from isolinux for hybrid MBR
          ls -la /usr/lib/ISOLINUX/isohdpfx.bin || sudo apt-get install -y syslinux-common

      # Render {{PLACEHOLDER}} tokens in the autounattend template with values
      # from GitHub Actions Secrets. Writes the rendered XML to AUTOU_XML env
      # var so the existing "Write rendered autounattend to disk" step picks
      # it up unchanged. Runs unconditionally — every build should embed
      # credentials when they're configured.
      #
      # Template lookup order: <config_root>/autounattend/<product>.xml, then
      # <config_root>/autounattend/base.xml, then .winforge/autounattend/base.xml
      # (winforge's default no-credential fallback for self-build).
      - name: Render autounattend from template + secrets
        id: render_autou
        shell: bash
        env:
          PRODUCT_KEY: ${{ secrets.PRODUCT_KEY }}
          LOCAL_ADMIN_NAME: ${{ secrets.LOCAL_ADMIN_NAME }}
          LOCAL_ADMIN_PASS: ${{ secrets.LOCAL_ADMIN_PASS }}
          COMPUTER_NAME: ${{ secrets.COMPUTER_NAME }}
        run: |
          mkdir -p artifacts/autounattend
          # Pick the most-specific template available, then fall back.
          # Caller's repo first, then winforge's defaults.
          CFG=""
          if [ -n "$CONFIG_ROOT" ]; then CFG="$CONFIG_ROOT"; fi
          TEMPLATE=""
          for root in "$CFG" .winforge .; do
            if [ -n "$root" ] && [ -d "$root" ]; then
              if [ -n "${PRODUCT:-}" ] && [ -f "$root/autounattend/${PRODUCT}.xml" ]; then
                TEMPLATE="$root/autounattend/${PRODUCT}.xml"
                break
              elif [ -f "$root/autounattend/base.xml" ]; then
                TEMPLATE="$root/autounattend/base.xml"
                break
              fi
            fi
          done
          if [ -z "$TEMPLATE" ]; then
            echo "No autounattend template found in $CFG, .winforge, or .; skipping render"
            exit 0
          fi
          echo "Using autounattend template: $TEMPLATE"
          # If the template has no {{...}} placeholders, copy verbatim
          if ! grep -q '{{' "$TEMPLATE"; then
            echo "Template $TEMPLATE has no placeholders; copying verbatim"
            cp "$TEMPLATE" artifacts/autounattend/win11.xml
            # Multi-line env var — use heredoc with delimiter (see below)
            {
              echo "AUTOU_XML<<XML_EOF"
              cat artifacts/autounattend/win11.xml
              echo ""
              echo "XML_EOF"
            } >> "$GITHUB_ENV"
            exit 0
          fi
          # Render with values from env (each secret already a string)
          RENDERED=$(PRODUCT_KEY="$PRODUCT_KEY" \
                     LOCAL_ADMIN_NAME="$LOCAL_ADMIN_NAME" \
                     LOCAL_ADMIN_PASS="$LOCAL_ADMIN_PASS" \
                     COMPUTER_NAME="$COMPUTER_NAME" \
                     python -c "
          import os, sys
          from pathlib import Path
          from scripts.build.inject_autounattend import render
          keys = ['PRODUCT_KEY', 'LOCAL_ADMIN_NAME', 'LOCAL_ADMIN_PASS', 'COMPUTER_NAME']
          values = {k: os.environ.get(k, '') for k in keys}
          src = Path('$TEMPLATE').read_text()
          sys.stdout.write(render(src, values))
          ")
          # Validate: no placeholders left behind (means a secret was missing)
          if echo "$RENDERED" | grep -q '{{'; then
            echo "::error::Rendered autounattend still contains {{...}} placeholders. A secret is missing?"
            echo "$RENDERED" | grep -oE '\{\{[A-Z0-9_]+\}\}' | sort -u
            exit 1
          fi
          printf '%s' "$RENDERED" > artifacts/autounattend/win11.xml
          # Multi-line content in $GITHUB_ENV trips Actions' env-file parser
          # (it expects KEY=value, not block scalars). Use heredoc with a
          # delimiter, which is the documented way to embed multi-line values.
          {
            echo "AUTOU_XML<<XML_EOF"
            printf '%s' "$RENDERED"
            echo ""
            echo "XML_EOF"
          } >> "$GITHUB_ENV"
          echo "Rendered $TEMPLATE -> artifacts/autounattend/win11.xml ($(wc -c < artifacts/autounattend/win11.xml) bytes)"

      - name: Sync Intel RST drivers
        # In caller mode the script is in .winforge; in self-build mode it's in scripts/.
        # PYTHONPATH is set globally above; just call it from wherever.
        shell: bash
        run: |
          if [ -d .winforge ]; then
            cd .winforge
          fi
          python scripts/drivers/sync_intel_rst.py

      - name: Download UUP files + convert to ISO
        shell: bash
        env:
          COMPRESSION: ${{ env.COMPRESSION }}
        run: |
          mkdir -p artifacts
          # Pass compression through to convert.sh. The script lives in
          # .winforge/scripts/build/ for caller mode, scripts/build/ for self-build.
          if [ -d .winforge ]; then
            CONVERT=.winforge/scripts/build/convert.sh
          else
            CONVERT=scripts/build/convert.sh
          fi
          bash "$CONVERT" "$UUP_UUID" "$EDITION" artifacts/ "$COMPRESSION"

      - name: Inject Intel RST drivers into WIM
        shell: bash
        run: |
          WIM="artifacts/install.wim"
          if [ ! -f "$WIM" ]; then
            echo "No install.wim found — extracting from ISO"
            7z x artifacts/iso-in.iso -oartifacts/iso-extract -bd -y >/dev/null
            cp artifacts/iso-extract/sources/install.wim "$WIM"
          fi
          # wimlib can inject drivers on Linux without DISM
          # Drivers come from whichever repo checked out — in caller mode
          # we expect the caller to vendor their own RST pack or skip this
          # step via setting a workflow input. For self-build mode the
          # driver sync above populated drivers/pack/intel-rst.
          RST_ROOT="drivers/pack/intel-rst"
          if [ -d "$RST_ROOT" ]; then
            DRIVERS=$(find "$RST_ROOT" -name "iaStorAC.inf" -printf '%h\n' | head -1)
            if [ -n "$DRIVERS" ]; then
              echo "Injecting driver from: $DRIVERS"
              wimlib-imagex update "$WIM" 1 --command="add-driver $DRIVERS" 2>&1 | tail -3
            else
              echo "No iaStorAC.inf found in $RST_ROOT — skipping driver injection"
            fi
          else
            echo "No Intel RST drivers synced — skipping injection"
          fi

      - name: Write rendered autounattend to disk
        if: env.AUTOU_XML != ''
        shell: bash
        run: |
          mkdir -p artifacts/autounattend
          printf '%s' "$AUTOU_XML" > artifacts/autounattend/win11.xml

      - name: Repack ISO with autounattend
        shell: bash
        run: |
          AUTOU="artifacts/autounattend/win11.xml"
          [ -f "$AUTOU" ] || AUTOU="autounattend/base.xml"
          # Use the LABEL from the profile for the final ISO filename
          OUT_NAME="${LABEL:-${PRODUCT}-${EDITION}}"
          if [ -d .winforge ]; then
            REPACK=.winforge/scripts/build/repack.sh
          else
            REPACK=scripts/build/repack.sh
          fi
          bash "$REPACK" \
            artifacts/iso-in.iso \
            "artifacts/${OUT_NAME}.iso" \
            artifacts/install.wim \
            "$AUTOU"

      - name: Assign upload account
        id: assign
        shell: bash
        env:
          ACCOUNTS_YAML: ${{ secrets.ACCOUNTS_YAML }}
        run: |
          echo "$ACCOUNTS_YAML" > /tmp/accounts.yaml
          if [ -d .winforge ]; then cd .winforge; fi
          ACCOUNT=$(python -m scripts.rclone.assign "${PRODUCT}" "6.0" /tmp/accounts.yaml)
          echo "account=$ACCOUNT" >> $GITHUB_OUTPUT

      - name: Upload ISO to Google Drive
        if: env.RCLONE_CONF != ''
        shell: bash
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          OUT_NAME="${LABEL:-${PRODUCT}-${EDITION}}"
          if [ -d .winforge ]; then
            UPLOAD=.winforge/scripts/rclone/upload.sh
          else
            UPLOAD=scripts/rclone/upload.sh
          fi
          bash "$UPLOAD" \
            "artifacts/${OUT_NAME}.iso" \
            "${{ steps.assign.outputs.account }}" \
            "iso/${PRODUCT}/" \
            ~/.config/rclone/rclone.conf

      - name: Upload ISO artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ env.LABEL || format('{0}-{1}', env.PRODUCT, env.EDITION) }}
          path: artifacts/*.iso
          retention-days: 7
          if-no-files-found: ignore
