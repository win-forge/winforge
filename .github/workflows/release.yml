name: release

# GITHUB_TOKEN's default permissions don't include releases; explicit grant.
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1, v1.2.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; reusing"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created + pushed tag $TAG"
          fi

      - name: Create GitHub release
        env:
          TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If a release with this tag already exists, skip
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping"
            exit 0
          fi
          # Resolve the tag to its commit SHA (--target needs SHA, not tag name)
          TAG_SHA=$(git rev-parse "$TAG^{commit}")
          echo "Tag $TAG points at $TAG_SHA"
          # Auto-generate release notes from the commits since the previous tag
          PREV=$(git tag --sort=-version:refname | grep -v "^$TAG$" | head -1)
          if [ -n "$PREV" ]; then
            RANGE="$PREV..$TAG"
            NOTES="## Changes\n\nSee the commits between [$PREV](https://github.com/phantomic12/winforge/compare/$PREV...$TAG) and $TAG.\n\nCommits:\n"
            NOTES+=$(git log --pretty=format:"- %s (%h)" "$RANGE")
          else
            NOTES="Initial release."
          fi
          gh release create "$TAG" \
            --title "WinForge $TAG" \
            --notes "$NOTES" \
            --target "$TAG_SHA"
          echo "Created release $TAG"
